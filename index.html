<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #box {
            background-color: orange;
            text-align: center;
            font-weight: 600;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: green;
            border: 5px solid orangered;
        }

        #myForm {
            margin-top: 10px;
        }

        #idnumber {
            margin-top: 10px;
        }

        #myList {
            margin-top: 10px;
        }

        #keyboard {
            margin-top: 10px;
        }
    </style>

    <script src="mouseevents.js" defer></script>
    <script src="keyboardevents.js" defer></script>
    <script src="formevents.js" defer></script>
    <script src="focusevents.js" defer></script>
    <script src="eventdelegation.js" defer></script>
    <script src="keyboardevents.js" defer></script>


</head>

<body>

    <div id="box">
        <p>Cuckoo &#128038</p>
    </div>

    <form id="myForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">

        <label for="status">Status:</label>
        <select id="status" name="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="pending">Pending</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    <label for="Id number">Id#: </label>
    <input type="text" id="idnumber" onfocus="handleFocus();" onblur="handleBlur()">

    <ul id="myList">
        <li>Straberry Shortcake</li>
        <li>Red Velvet</li>
        <li>Black Forrest</li>
        <li>Tiramisu</li>
        <li>New York Cheesecake</li>
    </ul>

    <input type="text" id="keyboard">

    <p id="output"></p>

</body>

</html>
